<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | خليك مكانك</title>
    <link rel="icon" type="image/jpeg" href="assets/images/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>firebase.initializeApp(firebaseConfig);</script>
    <style>
        :root{--primary:#FFD700;--primary-dark:#F5C400;--primary-light:#FFF8DC;--dark:#1A1A1A;--dark-2:#2D2D2D;--dark-3:#3A3A3A;--gray:#888;--green:#22c55e;--red:#ef4444;--wa:#25D366;--radius:16px;--shadow:0 8px 32px rgba(0,0,0,.25)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow-x:hidden}
        body::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(255,215,0,.08),transparent 70%);top:-100px;right:-100px;border-radius:50%}
        body::after{content:'';position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(255,215,0,.05),transparent 70%);bottom:-50px;left:-50px;border-radius:50%}

        .page-wrapper{width:100%;max-width:460px;position:relative;z-index:1}

        .header{text-align:center;margin-bottom:2rem}
        .logo-wrap{width:80px;height:80px;border-radius:20px;overflow:hidden;margin:0 auto 1rem;box-shadow:0 8px 30px rgba(255,215,0,.25);border:2px solid rgba(255,215,0,.2)}
        .logo-wrap img{width:100%;height:100%;object-fit:cover}
        .header h1{font-size:1.7rem;font-weight:900;color:#fff;margin-bottom:.3rem}
        .header p{color:rgba(255,255,255,.45);font-size:.9rem}

        .card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:24px;padding:2rem;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.1)}

        /* Tabs */
        .tabs{display:flex;gap:0;margin-bottom:1.8rem;background:#f0f0f0;border-radius:12px;padding:4px}
        .tab{flex:1;padding:.7rem;text-align:center;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.3s;color:var(--gray);font-family:'Cairo',sans-serif;border:none;background:transparent}
        .tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--dark);box-shadow:0 4px 15px rgba(255,215,0,.3)}

        /* Forms */
        .form-section{display:none;animation:fadeUp .4s ease}
        .form-section.active{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        .form-group{margin-bottom:1rem}
        .form-label{font-weight:700;font-size:.82rem;color:var(--dark);margin-bottom:.35rem;display:block}
        .form-label i{color:var(--primary-dark);font-size:.75rem;margin-left:.3rem}
        .form-control{width:100%;padding:.8rem 1rem;border-radius:12px;border:2px solid #eee;font-family:'Cairo',sans-serif;font-size:.9rem;transition:.3s;background:#f8f9fa;direction:rtl}
        .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 .2rem rgba(255,215,0,.1);outline:none;background:#fff}

        .btn-primary{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--dark);border:none;border-radius:12px;font-weight:800;font-size:.95rem;font-family:'Cairo',sans-serif;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(255,215,0,.4)}
        .btn-primary:active{transform:scale(.98)}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

        .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
        .divider span{color:var(--gray);font-size:.82rem;font-weight:600;white-space:nowrap}

        .btn-google{width:100%;padding:.8rem;background:#fff;color:var(--dark);border:2px solid #e0e0e0;border-radius:12px;font-weight:700;font-size:.9rem;font-family:'Cairo',sans-serif;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:.6rem}
        .btn-google:hover{background:#f8f9fa;border-color:#ccc;transform:translateY(-1px)}
        .btn-google img{width:20px;height:20px}

        .form-footer{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--gray)}
        .form-footer a{color:var(--primary-dark);font-weight:700;text-decoration:none;transition:.3s}
        .form-footer a:hover{text-decoration:underline}

        .error-msg{background:#fee2e2;color:#991b1b;padding:.6rem 1rem;border-radius:10px;font-size:.82rem;font-weight:600;display:none;align-items:center;gap:.4rem;margin-bottom:1rem}
        .error-msg.show{display:flex;animation:fadeUp .3s ease}

        .success-msg{background:#dcfce7;color:#166534;padding:.6rem 1rem;border-radius:10px;font-size:.82rem;font-weight:600;display:none;align-items:center;gap:.4rem;margin-bottom:1rem}
        .success-msg.show{display:flex;animation:fadeUp .3s ease}

        .back{text-align:center;margin-top:1.5rem}
        .back a{color:rgba(255,255,255,.4);text-decoration:none;font-weight:600;font-size:.85rem;transition:.3s}
        .back a:hover{color:var(--primary)}

        /* Loading */
        .loading{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
        .loading.show{display:flex}
        .spinner{width:45px;height:45px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem}
        .loading p{color:#fff;font-weight:700;font-size:.95rem}
        @keyframes spin{to{transform:rotate(360deg)}}

        .forgot-link{text-align:left;margin-top:.5rem}
        .forgot-link a{color:var(--gray);font-size:.8rem;text-decoration:none;font-weight:600;transition:.3s}
        .forgot-link a:hover{color:var(--primary-dark)}

        @media(max-width:575px){
            body{padding:1rem}
            .card{padding:1.5rem}
            .header h1{font-size:1.4rem}
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingText">جاري تسجيل الدخول...</p>
</div>

<div class="page-wrapper">
    <div class="header">
        <div class="logo-wrap"><img src="assets/images/logo.jpg" alt="خليك مكانك"></div>
        <h1>مرحبا بيك!</h1>
        <p>سجل دخولك عشان تقدر تتبع طلباتك</p>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab" onclick="switchTab('register')">حساب جديد</button>
        </div>

        <!-- Login -->
        <div class="form-section active" id="loginSection">
            <div class="error-msg" id="loginError"><i class="fas fa-exclamation-circle"></i><span></span></div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="email@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" class="form-control" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div class="forgot-link">
                <a href="#" onclick="showForgot();return false">نسيت كلمة المرور؟</a>
            </div>
            <button class="btn-primary" id="loginBtn" onclick="doLogin()" style="margin-top:1rem">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            <div class="divider"><span>أو</span></div>
            <button class="btn-google" onclick="doGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                الدخول بحساب Google
            </button>
        </div>

        <!-- Register -->
        <div class="form-section" id="registerSection">
            <div class="error-msg" id="regError"><i class="fas fa-exclamation-circle"></i><span></span></div>
            <div class="success-msg" id="regSuccess"><i class="fas fa-check-circle"></i><span></span></div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> الاسم الكامل</label>
                <input type="text" class="form-control" id="regName" placeholder="اكتب اسمك" autocomplete="name">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-phone"></i> رقم التليفون</label>
                <input type="tel" class="form-control" id="regPhone" placeholder="01xxxxxxxxx" autocomplete="tel">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" class="form-control" id="regEmail" placeholder="email@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" class="form-control" id="regPass" placeholder="6 أحرف على الأقل" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-map-marker-alt"></i> العنوان <span style="color:#aaa;font-weight:400">(اختياري)</span></label>
                <input type="text" class="form-control" id="regAddress" placeholder="الشارع، العماره..." autocomplete="street-address">
            </div>
            <button class="btn-primary" id="regBtn" onclick="doRegister()">
                <i class="fas fa-user-plus"></i> إنشاء حساب
            </button>
            <div class="divider"><span>أو</span></div>
            <button class="btn-google" onclick="doGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                التسجيل بحساب Google
            </button>
        </div>

        <!-- Forgot Password -->
        <div class="form-section" id="forgotSection">
            <div class="error-msg" id="forgotError"><i class="fas fa-exclamation-circle"></i><span></span></div>
            <div class="success-msg" id="forgotSuccess"><i class="fas fa-check-circle"></i><span></span></div>
            <div style="text-align:center;margin-bottom:1.5rem">
                <div style="width:60px;height:60px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .8rem">
                    <i class="fas fa-key" style="font-size:1.3rem;color:var(--primary-dark)"></i>
                </div>
                <h3 style="font-size:1rem;font-weight:800;margin-bottom:.3rem">نسيت كلمة المرور؟</h3>
                <p style="color:var(--gray);font-size:.85rem">ادخل إيميلك وهنبعتلك رابط لإعادة التعيين</p>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" class="form-control" id="forgotEmail" placeholder="email@example.com">
            </div>
            <button class="btn-primary" id="forgotBtn" onclick="doForgot()">
                <i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين
            </button>
            <div class="form-footer" style="margin-top:1rem">
                <a href="#" onclick="switchTab('login');return false"><i class="fas fa-arrow-right"></i> رجوع لتسجيل الدخول</a>
            </div>
        </div>
    </div>

    <div class="back"><a href="index.html"><i class="fas fa-arrow-right"></i> العودة للموقع</a></div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.error-msg,.success-msg').forEach(m => m.classList.remove('show'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginSection').classList.add('active');
        } else if (tab === 'register') {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerSection').classList.add('active');
        }
    }

    function showForgot() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.error-msg,.success-msg').forEach(m => m.classList.remove('show'));
        document.getElementById('forgotSection').classList.add('active');
    }

    function showErr(id, msg) {
        const el = document.getElementById(id);
        el.querySelector('span').textContent = msg;
        el.classList.add('show');
    }

    function showSuc(id, msg) {
        const el = document.getElementById(id);
        el.querySelector('span').textContent = msg;
        el.classList.add('show');
    }

    function hideMsgs() {
        document.querySelectorAll('.error-msg,.success-msg').forEach(m => m.classList.remove('show'));
    }

    function showLoading(text) {
        document.getElementById('loadingText').textContent = text || 'جاري...';
        document.getElementById('loading').classList.add('show');
    }
    function hideLoading() { document.getElementById('loading').classList.remove('show'); }

    /* ===== LOGIN ===== */
    async function doLogin() {
        hideMsgs();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!email || !pass) return showErr('loginError', 'دخل البريد وكلمة المرور');
        document.getElementById('loginBtn').disabled = true;
        showLoading('جاري تسجيل الدخول...');
        try {
            const result = await firebase.auth().signInWithEmailAndPassword(email, pass);
            // Save customer data to localStorage
            const uid = result.user.uid;
            localStorage.setItem('km_customer_uid', uid);
            localStorage.setItem('km_customer_email', email);
            // Try to get customer profile from Firestore
            const snap = await firebase.firestore().collection('customers').where('email', '==', email).limit(1).get();
            if (!snap.empty) {
                const cust = snap.docs[0].data();
                localStorage.setItem('km_customer_name', cust.name || '');
                localStorage.setItem('km_customer_phone', cust.phone || '');
            } else {
                localStorage.setItem('km_customer_name', result.user.displayName || '');
                localStorage.setItem('km_customer_phone', '');
            }
            hideLoading();
            window.location.href = 'profile.html';
        } catch (err) {
            hideLoading();
            document.getElementById('loginBtn').disabled = false;
            let msg = 'حصلت مشكلة، جرب تاني';
            if (err.code === 'auth/user-not-found') msg = 'مش لاقي حساب بالإيميل ده';
            else if (err.code === 'auth/wrong-password') msg = 'كلمة المرور غلط';
            else if (err.code === 'auth/invalid-email') msg = 'الإيميل مش صحيح';
            else if (err.code === 'auth/too-many-requests') msg = 'حاول تاني بعد شوية';
            else if (err.code === 'auth/invalid-credential') msg = 'البيانات غلط، جرب تاني';
            showErr('loginError', msg);
        }
    }

    /* ===== REGISTER ===== */
    async function doRegister() {
        hideMsgs();
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const address = document.getElementById('regAddress').value.trim();

        if (!name) return showErr('regError', 'دخل اسمك');
        if (!phone) return showErr('regError', 'دخل رقم التليفون');
        if (!/^01[0125][0-9]{8}$/.test(phone)) return showErr('regError', 'رقم التليفون غير صحيح');
        if (!email) return showErr('regError', 'دخل البريد الإلكتروني');
        if (!pass || pass.length < 6) return showErr('regError', 'كلمة المرور لازم 6 أحرف على الأقل');

        document.getElementById('regBtn').disabled = true;
        showLoading('جاري إنشاء الحساب...');
        try {
            const result = await firebase.auth().createUserWithEmailAndPassword(email, pass);
            await result.user.updateProfile({ displayName: name });

            // Save to Firestore
            await firebase.firestore().collection('customers').add({
                name, phone, email, address: address || '',
                uid: result.user.uid,
                orderCount: 0, totalSpent: 0,
                createdAt: new Date().toISOString()
            });

            localStorage.setItem('km_customer_uid', result.user.uid);
            localStorage.setItem('km_customer_email', email);
            localStorage.setItem('km_customer_name', name);
            localStorage.setItem('km_customer_phone', phone);

            hideLoading();
            showSuc('regSuccess', 'تم إنشاء الحساب بنجاح!');
            setTimeout(() => { window.location.href = 'profile.html'; }, 1200);
        } catch (err) {
            hideLoading();
            document.getElementById('regBtn').disabled = false;
            let msg = 'حصلت مشكلة، جرب تاني';
            if (err.code === 'auth/email-already-in-use') msg = 'في حساب بالإيميل ده بالفعل';
            else if (err.code === 'auth/invalid-email') msg = 'الإيميل مش صحيح';
            else if (err.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة، حط أقوى';
            showErr('regError', msg);
        }
    }

    /* ===== GOOGLE LOGIN ===== */
    async function doGoogleLogin() {
        hideMsgs();
        showLoading('جاري الدخول بحساب Google...');
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            const result = await firebase.auth().signInWithPopup(provider);
            const user = result.user;

            localStorage.setItem('km_customer_uid', user.uid);
            localStorage.setItem('km_customer_email', user.email || '');
            localStorage.setItem('km_customer_name', user.displayName || '');
            localStorage.setItem('km_customer_phone', user.phoneNumber || '');

            // Check if customer exists in Firestore, if not create
            const snap = await firebase.firestore().collection('customers').where('email', '==', user.email).limit(1).get();
            if (snap.empty) {
                await firebase.firestore().collection('customers').add({
                    name: user.displayName || '',
                    phone: user.phoneNumber || '',
                    email: user.email || '',
                    address: '',
                    uid: user.uid,
                    orderCount: 0, totalSpent: 0,
                    createdAt: new Date().toISOString()
                });
            }

            hideLoading();
            window.location.href = 'profile.html';
        } catch (err) {
            hideLoading();
            let msg = 'حصلت مشكلة، جرب تاني';
            if (err.code === 'auth/popup-closed-by-user') msg = 'لغيت العملية';
            else if (err.code === 'auth/cancelled-popup-request') msg = 'تم الإلغاء';
            showErr('loginError', msg);
        }
    }

    /* ===== FORGOT PASSWORD ===== */
    async function doForgot() {
        hideMsgs();
        const email = document.getElementById('forgotEmail').value.trim();
        if (!email) return showErr('forgotError', 'دخل البريد الإلكتروني');
        document.getElementById('forgotBtn').disabled = true;
        showLoading('جاري الإرسال...');
        try {
            await firebase.auth().sendPasswordResetEmail(email);
            hideLoading();
            showSuc('forgotSuccess', 'تم إرسال رابط إعادة التعيين على الإيميل!');
            document.getElementById('forgotBtn').disabled = false;
        } catch (err) {
            hideLoading();
            document.getElementById('forgotBtn').disabled = false;
            let msg = 'حصلت مشكلة، جرب تاني';
            if (err.code === 'auth/user-not-found') msg = 'مش لاقي حساب بالإيميل ده';
            showErr('forgotError', msg);
        }
    }

    /* ===== AUTO-REDIRECT IF ALREADY LOGGED IN ===== */
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            localStorage.setItem('km_customer_uid', user.uid);
            localStorage.setItem('km_customer_email', user.email || '');
            localStorage.setItem('km_customer_name', user.displayName || '');
            localStorage.setItem('km_customer_phone', user.phoneNumber || '');
            window.location.href = 'profile.html';
        }
    });

    /* Enter key handlers */
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('regPass').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
    document.getElementById('forgotEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doForgot(); });
</script>
</body>
</html>
