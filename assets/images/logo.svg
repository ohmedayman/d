<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- Inner Circle -->
  <circle cx="256" cy="256" r="220" fill="url(#grad2)"/>
  
  <!-- Motorcycle Icon -->
  <g transform="translate(128, 140) scale(1.8)">
    <!-- Motorcycle Body -->
    <path d="M80 120 L100 80 L140 60 L180 60 L200 80 L220 100 L240 120 L240 140 L220 140 L200 120 L180 120 L160 140 L100 140 L80 140 Z" fill="white" stroke="white" stroke-width="2"/>
    
    <!-- Front Wheel -->
    <circle cx="80" cy="150" r="25" fill="none" stroke="white" stroke-width="6"/>
    <circle cx="80" cy="150" r="8" fill="white"/>
    
    <!-- Rear Wheel -->
    <circle cx="220" cy="150" r="25" fill="none" stroke="white" stroke-width="6"/>
    <circle cx="220" cy="150" r="8" fill="white"/>
    
    <!-- Handlebar -->
    <path d="M60 100 L40 80 M60 100 L80 80" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    
    <!-- Seat -->
    <ellipse cx="160" cy="105" rx="30" ry="10" fill="white"/>
    
    <!-- Headlight -->
    <circle cx="50" cy="110" r="8" fill="#FFD700"/>
  </g>
  
  <!-- Company Name -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" direction="rtl">خليك مكانك</text>
  
  <!-- Location -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.9">Fayoum</text>
</svg>
