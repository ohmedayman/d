<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول لوحة التحكم | خليك مكانك</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#FFD700;--primary-dark:#F5C400;--dark:#1A1A1A;--gray:#666}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#FFF8DC,#fff,#FFF8DC);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
        .login-card{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.1);width:100%;max-width:420px;overflow:hidden}
        .login-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:2.5rem 2rem;text-align:center}
        .login-logo{width:80px;height:80px;border-radius:50%;margin:0 auto 1rem;border:4px solid rgba(255,255,255,.5);overflow:hidden}
        .login-logo img{width:100%;height:100%;object-fit:cover}
        .login-header h1{font-size:1.5rem;font-weight:800;color:var(--dark)}
        .login-header p{color:var(--dark);opacity:.7;font-size:.9rem}
        .login-body{padding:2rem}
        .form-group{margin-bottom:1.2rem}
        .form-group label{display:block;font-weight:600;font-size:.9rem;margin-bottom:.4rem;color:var(--dark)}
        .form-input{width:100%;padding:.8rem 1rem;border:2px solid #eee;border-radius:12px;font-family:'Cairo',sans-serif;font-size:1rem;transition:.3s}
        .form-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 .2rem rgba(255,215,0,.2)}
        .btn-login{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--dark);border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-weight:800;font-size:1.1rem;cursor:pointer;transition:.3s;margin-top:.5rem}
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,215,0,.4)}
        .btn-login:active{transform:scale(.98)}
        .error-msg{background:#fee2e2;color:#991b1b;padding:.8rem 1rem;border-radius:10px;font-size:.9rem;display:none;margin-bottom:1rem;text-align:center}
        .hint{text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #eee}
        .hint p{color:var(--gray);font-size:.85rem}
        .hint strong{color:var(--primary-dark)}
        .back-link{text-align:center;margin-top:1rem}
        .back-link a{color:var(--gray);text-decoration:none;font-size:.9rem}
        .back-link a:hover{color:var(--primary-dark)}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img src="../assets/images/logo.jpg" alt="خليك مكانك">
            </div>
            <h1>لوحة التحكم</h1>
            <p>خليك مكانك - إدارة الطلبات</p>
        </div>
        <div class="login-body">
            <div class="error-msg" id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="text" class="form-input" id="email" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">دخول</button>
            </form>
            <div class="hint">
                <p>بيانات الدخول: <strong>admin</strong> / <strong>123456</strong></p>
            </div>
            <div class="back-link">
                <a href="../index.html">← العودة للموقع</a>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('admin_logged_in') === 'true') {
            location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            // Hardcoded admin credentials
            if ((email === 'admin' || email === 'admin@khalikmakana.com') && password === '123456') {
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_user', 'Admin');
                location.href = 'dashboard.html';
            } else {
                error.textContent = 'بيانات الدخول غير صحيحة';
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
