<script>
    let customerData = null;
    let allOrders = [];

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
        if (tab === 'orders') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('ordersSection').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('profileSection').classList.add('active');
        }
    }

    function initPage(user) {
        const name = user.displayName || localStorage.getItem('km_customer_name') || 'Ø¹Ù…ÙŠÙ„';
        const email = user.email || localStorage.getItem('km_customer_email') || '';
        document.getElementById('userName').textContent = name;
        document.getElementById('userEmail').textContent = email;
        document.getElementById('welcomeMsg').textContent = `Ù…Ø±Ø­Ø¨Ø§ ${name}`;
        document.getElementById('avatarEl').textContent = name.charAt(0);

        // Fill profile form
        document.getElementById('pName').value = name;
        document.getElementById('pPhone').value = localStorage.getItem('km_customer_phone') || '';
        document.getElementById('pAddress').value = customerData?.address || '';

        loadOrders(user.email || '', user.uid);
    }

    async function loadOrders(email, uid) {
        document.getElementById('ordersLoading').classList.add('show');
        try {
            // Get orders by email or phone
            let orders = [];
            if (email) {
                const snap = await firebase.firestore().collection('orders').where('customerEmail', '==', email).get();
                orders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }
            // Also check by phone
            const phone = localStorage.getItem('km_customer_phone');
            if (phone) {
                const snap2 = await firebase.firestore().collection('orders').where('customerPhone', '==', phone).get();
                const more = snap2.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                orders = [...orders, ...more];
            }
            // Deduplicate
            const seen = new Set();
            allOrders = orders.filter(o => { if (seen.has(o.id)) return false; seen.add(o.id); return true; });
            allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            document.getElementById('ordersLoading').classList.remove('show');
            document.getElementById('ordersList').style.display = 'block';
            renderOrders();
        } catch (err) {
            document.getElementById('ordersLoading').classList.remove('show');
            document.getElementById('ordersList').style.display = 'block';
            document.getElementById('emptyOrders').style.display = 'block';
            console.error(err);
        }
    }

    function renderOrders() {
        const stL = { pending:'Ù…Ø¹Ù„Ù‚', confirmed:'Ù…Ø¤ÙƒØ¯', picked:'ØªÙ… Ø§Ù„Ø§Ø³ØªÙ„Ø§Ù…', delivering:'ÙÙŠ Ø§Ù„Ø·Ø±ÙŠÙ‚', completed:'Ù…ÙƒØªÙ…Ù„', cancelled:'Ù…Ù„ØºÙŠ' };
        const svcL = { food:'Ø·Ø¹Ø§Ù…', package:'Ø·Ø±ÙˆØ¯', product:'Ù…Ù†ØªØ¬Ø§Øª' };
        const list = document.getElementById('ordersList');
        const empty = document.getElementById('emptyOrders');

        if (!allOrders.length) { list.style.display='none'; empty.style.display='block'; return; }
        empty.style.display='none';

        // Update stats
        document.getElementById('statOrders').textContent = allOrders.length;
        const total = allOrders.reduce((s, o) => s + (o.deliveryFee || 0), 0);
        document.getElementById('statSpent').textContent = total;
        const active = allOrders.filter(o => !['completed', 'cancelled'].includes(o.status)).length;
        document.getElementById('statActive').textContent = active;

        list.innerHTML = allOrders.map(o => {
            const st = o.status || 'pending';
            const d = o.createdAt ? new Date(o.createdAt).toLocaleDateString('ar-EG') : '-';
            return `<div class="order-item" onclick="window.location.href='track.html?id=${o.orderId||o.id}'">
                <div class="order-top">
                    <span><span class="status-dot st-${st}"></span> <span class="order-id">${o.orderId || o.id.slice(-8).toUpperCase()}</span></span>
                    <span class="order-svc">${svcL[o.serviceType] || '-'}</span>
                </div>
                <div class="order-bottom">
                    <span class="order-date">${d}</span>
                    <span class="order-fee">${o.deliveryFee || 0} Ø¬.Ù… â€” ${stL[st] || st}</span>
                </div>
            </div>`;
        }).join('');
    }

    async function saveProfile() {
        const msgEl = document.getElementById('profileMsg');
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        const address = document.getElementById('pAddress').value.trim();

        if (!name) { msgEl.className='msg err show'; msgEl.textContent='Ø¯Ø®Ù„ Ø§Ø³Ù…Ùƒ'; return; }

        try {
            // Update Firestore
            if (customerData && customerData.id) {
                await firebase.firestore().collection('customers').doc(customerData.id).update({
                    name, phone, address, updatedAt: new Date().toISOString()
                });
            }
            localStorage.setItem('km_customer_name', name);
            localStorage.setItem('km_customer_phone', phone);
            document.getElementById('userName').textContent = name;
            document.getElementById('avatarEl').textContent = name.charAt(0);
            document.getElementById('welcomeMsg').textContent = `Ù…Ø±Ø­Ø¨Ø§ ${name}`;
            msgEl.className='msg ok show'; msgEl.textContent='ØªÙ… Ø§Ù„Ø­ÙØ¸!';
            setTimeout(() => msgEl.classList.remove('show'), 2000);
        } catch (err) {
            msgEl.className='msg err show'; msgEl.textContent='Ø­ØµÙ„Øª Ù…Ø´ÙƒÙ„Ø©ØŒ Ø¬Ø±Ø¨ ØªØ§Ù†ÙŠ';
            console.error(err);
        }
    }

    async function doLogout() {
        await firebase.auth().signOut();
        localStorage.removeItem('km_customer_uid');
        localStorage.removeItem('km_customer_email');
        localStorage.removeItem('km_customer_name');
        localStorage.removeItem('km_customer_phone');
        window.location.href = 'auth.html';
    }

    /* ===== AUTH CHECK ===== */
    firebase.auth().onAuthStateChanged(async user => {
        if (!user) { window.location.href = 'auth.html'; return; }

        // Try to load customer data from Firestore
        try {
            const snap = await firebase.firestore().collection('customers').where('email', '==', user.email).limit(1).get();
            if (!snap.empty) {
                customerData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                localStorage.setItem('km_customer_name', customerData.name || '');
                localStorage.setItem('km_customer_phone', customerData.phone || '');
            }
        } catch(e) { console.log(e); }

        initPage(user);
    });
</script>
