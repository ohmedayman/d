<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب | راحتك</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script>firebase.initializeApp(firebaseConfig);</script>
    <link rel="stylesheet" href="driver.css">
</head>
<body>

    <!-- Header -->
    <div class="d-header">
        <div class="d-header-right">
            <div class="d-avatar" id="driverAvatar">م</div>
            <div class="d-header-info">
                <h3 id="driverNameHeader">-</h3>
                <span id="driverAreaHeader">-</span>
            </div>
        </div>
        <div class="d-header-left">
            <button class="d-status-badge online" id="statusToggle" onclick="toggleOnline()">
                <i class="fas fa-circle"></i> <span id="statusText">متاح</span>
            </button>
            <button class="btn-logout-d" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <!-- ===== ORDERS PAGE ===== -->
    <div class="d-page active" id="page-orders">
        <!-- Stats -->
        <div class="d-stats">
            <div class="d-stat pending"><h3 id="sPending">0</h3><p>معلقة</p></div>
            <div class="d-stat active"><h3 id="sActive">0</h3><p>نشطة</p></div>
            <div class="d-stat done"><h3 id="sDone">0</h3><p>مكتملة</p></div>
        </div>

        <!-- Active Orders -->
        <div class="d-section">
            <div class="d-section-header">
                <h2><i class="fas fa-fire" style="color:var(--orange)"></i> الطلبات الحالية</h2>
                <span id="activeCount">0 طلب</span>
            </div>
            <div id="activeOrdersList"></div>
        </div>

        <!-- Pending Orders -->
        <div class="d-section">
            <div class="d-section-header">
                <h2><i class="fas fa-clock" style="color:var(--orange)"></i> طلبات تانية متاحة</h2>
                <span id="pendingCount">0 طلب</span>
            </div>
            <div id="pendingOrdersList"></div>
        </div>
    </div>

    <!-- ===== HISTORY PAGE ===== -->
    <div class="d-page" id="page-history">
        <div class="d-section">
            <div class="d-section-header">
                <h2><i class="fas fa-history" style="color:var(--blue)"></i> سجل التوصيلات</h2>
                <span id="historyCount">0</span>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- ===== PROFILE PAGE ===== -->
    <div class="d-page" id="page-profile">
        <div class="d-section">
            <div class="d-profile-card">
                <div class="d-profile-avatar" id="profileAvatar">م</div>
                <h2 id="profileName">-</h2>
                <p id="profilePhone">-</p>
                <div class="d-profile-stats">
                    <div class="d-profile-stat"><h3 id="pTotalOrders">0</h3><p>إجمالي الطلبات</p></div>
                    <div class="d-profile-stat"><h3 id="pTodayOrders">0</h3><p>طلبات اليوم</p></div>
                    <div class="d-profile-stat"><h3 id="pTotalRevenue">0</h3><p>إجمالي الأرباح</p></div>
                </div>
            </div>

            <div style="background:#fff;border-radius:18px;padding:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.05)">
                <div class="d-info-row"><span class="lbl"><i class="fas fa-phone"></i> التليفون</span><span class="val" id="pPhone">-</span></div>
                <div class="d-info-row"><span class="lbl"><i class="fas fa-motorcycle"></i> الموتوسيكل</span><span class="val" id="pBike">-</span></div>
                <div class="d-info-row"><span class="lbl"><i class="fas fa-map-marker-alt"></i> المنطقة</span><span class="val" id="pArea">-</span></div>
                <div class="d-info-row"><span class="lbl"><i class="fas fa-circle" id="pStatusIcon"></i> الحالة</span><span class="val" id="pStatus">-</span></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container-d" id="toastContainer"></div>

    <!-- Bottom Nav -->
    <div class="d-bottom-nav">
        <div class="d-bottom-nav-items">
            <button class="d-bottom-nav-item active" data-page="orders" onclick="switchPage('orders')">
                <i class="fas fa-shopping-cart"></i>
                <span>الطلبات</span>
                <span class="d-bottom-nav-badge" id="ordersBadge" style="display:none">0</span>
            </button>
            <button class="d-bottom-nav-item" data-page="history" onclick="switchPage('history')">
                <i class="fas fa-history"></i>
                <span>السجل</span>
            </button>
            <button class="d-bottom-nav-item" data-page="profile" onclick="switchPage('profile')">
                <i class="fas fa-user"></i>
                <span>البروفايل</span>
            </button>
        </div>
    </div>

    <script>
    /* ===== AUTH ===== */
    if (localStorage.getItem('driver_logged_in') !== 'true') location.href = 'login.html';
    const driverId = localStorage.getItem('driver_id');
    const driverName = localStorage.getItem('driver_name');
    const driverPhone = localStorage.getItem('driver_phone');

    /* ===== REAL-TIME LISTENER ===== */
    let unsubscribeOrders = null;

    function startRealtime() {
        unsubscribeOrders = firebase.firestore().collection('orders').orderBy('createdAt','desc')
            .onSnapshot(async snap => {
                await render();
            }, err => console.log('Realtime error:', err));
    }

    async function logout() {
        if (unsubscribeOrders) unsubscribeOrders();
        localStorage.removeItem('driver_logged_in');
        localStorage.removeItem('driver_id');
        localStorage.removeItem('driver_name');
        localStorage.removeItem('driver_phone');
        await firebase.auth().signOut();
        location.href = 'login.html';
    }

    /* ===== DB ===== */
    const DB = {
        async getAll(col) {
            const snap = await firebase.firestore().collection(col).orderBy('createdAt','desc').get();
            return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        },
        async update(col, id, data) {
            data.updatedAt = new Date().toISOString();
            await firebase.firestore().collection(col).doc(id).update(data);
        }
    };

    /* ===== CONSTANTS ===== */
    const svcL = { online:'أونلاين', personal:'أفراد', documents:'مستندات' };
    const svcC = { online:'online', personal:'personal', documents:'documents' };
    const stL = { pending:'معلق', confirmed:'مؤكد', picked:'تم الاستلام', delivering:'في الطريق', completed:'مكتمل', cancelled:'ملغي' };

    /* ===== GET DRIVER DATA ===== */
    async function getDriver() {
        const snap = await firebase.firestore().collection('drivers').doc(driverId).get();
        return snap.exists ? { id: snap.id, ...snap.data() } : {};
    }

    /* ===== RENDER ===== */
    async function render() {
        const driver = await getDriver();
        const allOrders = await DB.getAll('orders');
        const myOrders = allOrders.filter(o => o.driverPhone === driverPhone || o.driverName === driverName);

        // Header
        document.getElementById('driverAvatar').textContent = (driver.name || driverName || 'م')[0];
        document.getElementById('driverNameHeader').textContent = driver.name || driverName;
        document.getElementById('driverAreaHeader').textContent = driver.area || 'الفيوم';

        // Online status
        const isOnline = driver.status !== 'busy';
        const toggle = document.getElementById('statusToggle');
        toggle.className = 'd-status-badge ' + (isOnline ? 'online' : 'offline');
        document.getElementById('statusText').textContent = isOnline ? 'متاح' : 'مشغول';

        // Stats
        const active = myOrders.filter(o => ['confirmed','picked','delivering'].includes(o.status));
        const pending = myOrders.filter(o => o.status === 'pending');
        const done = myOrders.filter(o => o.status === 'completed');
        document.getElementById('sPending').textContent = pending.length;
        document.getElementById('sActive').textContent = active.length;
        document.getElementById('sDone').textContent = done.length;

        // Badge
        const badge = document.getElementById('ordersBadge');
        if (active.length > 0) { badge.textContent = active.length; badge.style.display = 'flex'; }
        else { badge.style.display = 'none'; }

        // Active Orders
        const al = document.getElementById('activeOrdersList');
        const allActive = [...active, ...pending].filter(o => o.status !== 'completed' && o.status !== 'cancelled');
        document.getElementById('activeCount').textContent = allActive.length + ' طلب';

        if (!allActive.length) {
            al.innerHTML = '<div class="d-empty"><i class="fas fa-check-circle"></i><h3>مفيش طلبات حالياً</h3><p>استنى طلب جديد</p></div>';
        } else {
            al.innerHTML = allActive.map(o => renderOrderCard(o)).join('');
        }

        // Pending (unassigned)
        const unassigned = allOrders.filter(o => o.status === 'pending' && !o.driverName);
        document.getElementById('pendingCount').textContent = unassigned.length + ' طلب';
        const pl = document.getElementById('pendingOrdersList');
        if (!unassigned.length) {
            pl.innerHTML = '<div class="d-empty"><i class="fas fa-inbox"></i><h3>مفيش طلبات متاحة</h3></div>';
        } else {
            pl.innerHTML = unassigned.map(o => renderOrderCard(o, true)).join('');
        }

        // History
        const hl = document.getElementById('historyList');
        document.getElementById('historyCount').textContent = done.length;
        if (!done.length) {
            hl.innerHTML = '<div class="d-empty"><i class="fas fa-history"></i><h3>مفيش توصيلات لسه</h3><p>ابدأ أول توصيل</p></div>';
        } else {
            hl.innerHTML = done.map(o => `
                <div class="d-history-card">
                    <div class="d-history-info">
                        <h4><i class="fas fa-box" style="color:var(--primary-dark);margin-left:.3rem"></i> ${o.orderId || o.id.toUpperCase()}</h4>
                        <p>${o.customerName} - ${svcL[o.serviceType]||o.serviceType}</p>
                    </div>
                    <div class="d-history-right">
                        <div class="d-history-fee">${o.deliveryFee || 0} ج.م</div>
                        <div class="d-history-date">${o.completedAt ? new Date(o.completedAt).toLocaleDateString('ar-EG') : ''}</div>
                    </div>
                </div>
            `).join('');
        }

        // Profile
        document.getElementById('profileAvatar').textContent = (driver.name || driverName || 'م')[0];
        document.getElementById('profileName').textContent = driver.name || driverName;
        document.getElementById('profilePhone').textContent = driverPhone;
        document.getElementById('pPhone').textContent = driverPhone;
        document.getElementById('pBike').textContent = driver.bike || '—';
        document.getElementById('pArea').textContent = driver.area || 'الفيوم';
        document.getElementById('pStatus').textContent = isOnline ? 'متاح' : 'مشغول';
        document.getElementById('pStatusIcon').style.color = isOnline ? 'var(--green)' : 'var(--red)';

        // Profile stats
        document.getElementById('pTotalOrders').textContent = done.length;
        const today = new Date().toDateString();
        document.getElementById('pTodayOrders').textContent = done.filter(o => o.completedAt && new Date(o.completedAt).toDateString() === today).length;
        document.getElementById('pTotalRevenue').textContent = done.reduce((s,o) => s + (o.deliveryFee||0), 0) + ' ج.م';
    }

    function renderOrderCard(o, canAccept) {
        const isMine = o.driverPhone === driverPhone || o.driverName === driverName;
        let actions = '';

        if (canAccept && !isMine) {
            actions = `<button class="btn-accept" onclick="acceptOrder('${o.id}')"><i class="fas fa-check"></i> أقبل الطلب</button>`;
        } else if (isMine) {
            switch (o.status) {
                case 'confirmed':
                    actions = `<button class="btn-pickup" onclick="updateStatus('${o.id}','picked')"><i class="fas fa-box-open"></i> استلمت الطلب</button>`;
                    break;
                case 'picked':
                    actions = `<button class="btn-delivering" onclick="updateStatus('${o.id}','delivering')"><i class="fas fa-motorcycle"></i> في الطريق</button>`;
                    break;
                case 'delivering':
                    actions = `<button class="btn-complete" onclick="updateStatus('${o.id}','completed')"><i class="fas fa-check-double"></i> تم التوصيل</button>`;
                    break;
            }
        }

        if (isMine && o.status !== 'completed' && o.status !== 'cancelled') {
            actions += `<a href="tel:${o.customerPhone}" class="btn-call"><i class="fas fa-phone"></i> اتصل</a>`;
            actions += `<a href="https://wa.me/20${o.customerPhone}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i></a>`;
            actions += `<a href="https://maps.google.com/?q=${encodeURIComponent(o.customerAddress||'')}" target="_blank" class="btn-nav"><i class="fas fa-map-marker-alt"></i></a>`;
        }

        return `
        <div class="d-order-card ${o.status}">
            <div class="d-order-top">
                <div class="d-order-id"><i class="fas fa-hashtag" style="color:var(--primary-dark)"></i> <code>${o.orderId || o.id.toUpperCase()}</code></div>
                <div class="d-order-svc ${svcC[o.serviceType]||''}">${svcL[o.serviceType]||o.serviceType}</div>
            </div>
            <div class="d-order-customer">
                <h4><i class="fas fa-user" style="color:var(--primary-dark);margin-left:.3rem;font-size:.8rem"></i> ${o.customerName||'-'}</h4>
                <p><i class="fas fa-phone"></i> ${o.customerPhone||'-'}</p>
                <p><i class="fas fa-map-marker-alt"></i> ${o.customerAddress||'-'}</p>
                ${o.notes ? '<p><i class="fas fa-sticky-note"></i> '+o.notes+'</p>' : ''}
            </div>
            <div class="d-order-meta">
                <div class="d-order-meta-item"><span class="meta-label">التكلفة</span><span class="meta-value">${o.deliveryFee||0} ج.م</span></div>
                <div class="d-order-meta-item"><span class="meta-label">الوقت</span><span class="meta-value">${o.createdAt ? new Date(o.createdAt).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '-'}</span></div>
            </div>
            <div class="d-order-actions">${actions}</div>
        </div>`;
    }

    /* ===== ACTIONS ===== */
    window.acceptOrder = async function(id) {
        await DB.update('orders', id, { driverName: driverName, driverPhone: driverPhone, status: 'confirmed', confirmedAt: new Date().toISOString() });
        toast('تم قبول الطلب', 'success');
        await render();
    };

    window.updateStatus = async function(id, status) {
        const updates = { status };
        if (status === 'picked') updates.pickedAt = new Date().toISOString();
        if (status === 'delivering') updates.deliveringAt = new Date().toISOString();
        if (status === 'completed') {
            updates.completedAt = new Date().toISOString();
            await firebase.firestore().collection('drivers').doc(driverId).update({
                orderCount: firebase.firestore.FieldValue.increment(1)
            });
        }
        await DB.update('orders', id, updates);
        toast('تم التحديث: ' + stL[status], 'success');
        await render();
    };

    window.toggleOnline = async function() {
        const driver = await getDriver();
        const newStatus = driver.status === 'available' ? 'busy' : 'available';
        await firebase.firestore().collection('drivers').doc(driverId).update({ status: newStatus });
        toast(newStatus === 'available' ? 'أنت متاح دلوقتي' : 'أنت مشغول', 'info');
        await render();
    };

    /* ===== NAVIGATION ===== */
    window.switchPage = function(page) {
        document.querySelectorAll('.d-page').forEach(p => p.classList.toggle('active', p.id === 'page-'+page));
        document.querySelectorAll('.d-bottom-nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
        window.scrollTo({top:0, behavior:'smooth'});
    };

    /* ===== TOAST ===== */
    function toast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = 'toast-item-d ' + type;
        t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='danger'?'exclamation-circle':'info-circle'}"></i><span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(()=>t.classList.add('show'),10);
        setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
    }

    /* ===== INIT ===== */
    render();
    startRealtime();
    </script>
</body>
</html>
